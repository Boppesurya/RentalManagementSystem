# CORS Configuration
spring.web.cors.allowed-origins=http://localhost:5173
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
	spring.web.cors.allowed-headers=*
	
	# File Upload Configuration
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB
spring.mvc.async.request-timeout=-1
server.tomcat.connection-upload-timeout=-1
server.tomcat.max-swallow-size=-1
server.tomcat.max-http-form-post-size=-1

# Logging Configuration
logging.level.com.xerox.rental=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Actuator Configuration
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# Rate Limiting Configuration
rate.limit.authentication=5
rate.limit.general-api=100
rate.limit.subscription=20
rate.limit.payment=10
rate.limit.report-generation=5
rate.limit.file-upload=10
rate.limit.email=20
rate.limit.public-api=50
rate.limit.persist.events=true
rate.limit.premium-multiplier=2.0
rate.limit.enterprise-multiplier=5.0
rate.limit.whitelisted-ips=
rate.limit.whitelisted-user-ids=

